name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_ENV: test
      DATABASE_URL: postgresql://finance:finance@localhost:5432/finance_manager
      LOG_LEVEL: silent
      WEB_PORT: 3000
      WORKER_PORT: 3001

    services:
      postgres:
        image: postgres:18.1-alpine
        env:
          POSTGRES_DB: finance_manager
          POSTGRES_PASSWORD: finance
          POSTGRES_USER: finance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finance -d finance_manager"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Test
        run: pnpm exec vitest run

      - name: Build
        run: pnpm build

      - name: Build production containers
        run: |
          docker build \
            --target web \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=ci-public-value \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=ci-public-value \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=ci.example.invalid \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=ci-project \
            -t hidmo-web:ci .
          docker build --target worker -t hidmo-worker:ci .
          docker build --target migrations -t hidmo-migrations:ci .

  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infra

      - name: Initialize Terraform without backend
        run: terraform -chdir=infra/environments/dev init -backend=false

      - name: Validate Terraform
        run: terraform -chdir=infra/environments/dev validate
